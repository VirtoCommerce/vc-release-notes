<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virto Commerce – Release Notes | February 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --virto-navy: #07254A;
    --virto-navy-2: #0B3270;
    --virto-blue: #2B7FFF;
    --virto-blue-2: #1A6CFF;
    --virto-cyan: #38BDF8;
    --virto-accent: #FF6A3D;
    --virto-gold: #FBBF24;
    --virto-bg: #F4F7FB;
    --virto-bg-2: #EAF1FA;
    --virto-white: #FFFFFF;
    --virto-text: #0F172A;
    --virto-muted: #5B6B82;
    --virto-line: #DCE5F1;

    --size-s:  #22C55E;   /* green — drop-in / light config */
    --size-m:  #FBBF24;   /* amber — setup + dev */
    --size-l:  #F97316;   /* orange — integration / migration */

    --shadow-soft: 0 10px 40px -12px rgba(7, 37, 74, 0.18);
    --shadow-deep: 0 30px 80px -30px rgba(7, 37, 74, 0.35);

    --radius: 16px;
    --radius-lg: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--virto-bg);
    color: var(--virto-text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .slide {
    position: absolute;
    width: min(1200px, calc(100vw - 48px));
    height: min(720px, calc(100vh - 48px));
    background: var(--virto-white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-deep);
    overflow: hidden;
    opacity: 0;
    transform: translateX(40px) scale(0.98);
    transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                visibility 0s linear 0.45s;
    pointer-events: none;
    visibility: hidden;
  }

  .slide.active {
    opacity: 1;
    transform: translateX(0) scale(1);
    pointer-events: auto;
    visibility: visible;
    transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                visibility 0s linear 0s;
  }

  .slide-inner {
    position: relative;
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 36px 50px 24px;
  }

  .slide-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--virto-line);
    gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--virto-blue), var(--virto-navy));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 18px;
    letter-spacing: -0.5px;
    box-shadow: 0 4px 12px rgba(43, 127, 255, 0.4);
    overflow: hidden;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-text .b1 { font-weight: 700; font-size: 14px; color: var(--virto-navy); letter-spacing: -0.2px; }
  .brand-text .b2 { font-size: 11px; color: var(--virto-muted); text-transform: uppercase; letter-spacing: 1.2px; }
  .header-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--virto-muted);
    text-transform: uppercase; letter-spacing: 1.4px;
    flex-wrap: wrap; justify-content: flex-end;
  }
  .header-meta .pill {
    background: var(--virto-bg-2); color: var(--virto-navy);
    padding: 6px 12px; border-radius: 999px;
    font-weight: 600; letter-spacing: 0.8px;
  }

  .ts-badge {
    display: inline-flex; align-items: center;
    padding: 3px;
    border-radius: 8px;
    background: white;
    border: 1px solid var(--virto-line);
  }
  .ts-badge .ts-pill {
    width: 28px; height: 22px;
    border-radius: 6px;
    background: var(--ts-color, var(--virto-muted));
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 11px;
    display: inline-flex; align-items: center; justify-content: center;
    letter-spacing: 0;
  }
  .ts-badge[data-size="S"]  { --ts-color: var(--size-s);  }
  .ts-badge[data-size="M"]  { --ts-color: var(--size-m);  }
  .ts-badge[data-size="L"]  { --ts-color: var(--size-l);  }

  /* Backlog add button */
  .backlog-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: white;
    border: 1px solid var(--virto-line);
    color: var(--virto-muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .backlog-btn:hover {
    border-color: var(--virto-blue);
    color: var(--virto-blue);
    transform: translateY(-1px);
    box-shadow: 0 4px 10px -4px rgba(43, 127, 255, 0.4);
  }
  .backlog-btn.added {
    background: var(--virto-blue);
    color: white;
    border-color: var(--virto-blue);
  }
  .backlog-btn.added:hover {
    background: var(--virto-accent);
    border-color: var(--virto-accent);
    color: white;
  }
  .backlog-btn .plus { font-size: 14px; line-height: 1; }
  .backlog-btn .check { display: none; }
  .backlog-btn.added .plus { display: none; }
  .backlog-btn.added .check { display: inline; }
  .backlog-btn.added .label-add { display: none; }
  .backlog-btn.added .label-remove { display: inline; }
  .backlog-btn .label-remove { display: none; }

  /* Backlog counter in main nav */
  .backlog-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--virto-blue);
    color: white;
    border: none;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    margin-left: 4px;
  }
  .backlog-link:disabled {
    background: var(--virto-line);
    color: var(--virto-muted);
    cursor: not-allowed;
  }
  .backlog-link:not(:disabled):hover {
    background: var(--virto-accent);
    transform: translateY(-1px);
  }
  .backlog-link .count {
    background: rgba(255,255,255,0.25);
    padding: 1px 7px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 10px;
  }
  .backlog-link:disabled .count {
    background: rgba(7, 37, 74, 0.1);
  }

  /* BACKLOG screen */
  .backlog-screen {
    background:
      radial-gradient(ellipse at top right, rgba(43, 127, 255, 0.1), transparent 60%),
      linear-gradient(135deg, var(--virto-bg) 0%, var(--virto-bg-2) 100%);
  }
  .backlog-screen .slide-inner {
    padding: 36px 50px 24px;
    grid-template-rows: auto 1fr auto;
  }
  .backlog-body {
    display: flex; flex-direction: column;
    gap: 18px;
    overflow: hidden;
    padding: 18px 0;
  }
  .backlog-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
  }
  .backlog-title-block { flex: 1; min-width: 280px; }
  .backlog-eyebrow {
    color: var(--virto-blue);
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .backlog-eyebrow::before {
    content: ""; width: 22px; height: 1.5px; background: var(--virto-blue);
  }
  .backlog-screen h1 {
    font-size: clamp(28px, 3.5vw, 40px);
    font-weight: 800;
    line-height: 1.05;
    color: var(--virto-navy);
    letter-spacing: -1.2px;
    margin: 8px 0 6px;
  }
  .backlog-screen h1 .grad {
    background: linear-gradient(90deg, var(--virto-blue), var(--virto-cyan));
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .backlog-sub {
    font-size: 14px;
    color: var(--virto-muted);
    line-height: 1.5;
    max-width: 560px;
  }
  .backlog-actions {
    display: flex; gap: 10px; flex-wrap: wrap;
    align-items: center;
  }
  .bl-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--virto-line);
    background: white;
    color: var(--virto-navy);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .bl-btn:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-soft);
    border-color: var(--virto-blue);
  }
  .bl-btn.primary {
    background: var(--virto-blue);
    color: white;
    border-color: var(--virto-blue);
  }
  .bl-btn.primary:hover {
    background: var(--virto-blue-2);
    border-color: var(--virto-blue-2);
  }
  .bl-btn.primary.copied {
    background: var(--size-s);
    border-color: var(--size-s);
  }
  .bl-btn.danger:hover {
    border-color: var(--virto-accent);
    color: var(--virto-accent);
  }

  .backlog-list {
    flex: 1;
    overflow-y: auto;
    background: white;
    border: 1px solid var(--virto-line);
    border-radius: var(--radius);
    padding: 0;
    box-shadow: 0 6px 20px -10px rgba(7, 37, 74, 0.12);
  }
  .backlog-list::-webkit-scrollbar { width: 8px; }
  .backlog-list::-webkit-scrollbar-thumb {
    background: var(--virto-line);
    border-radius: 4px;
  }
  .backlog-empty {
    padding: 60px 40px;
    text-align: center;
    color: var(--virto-muted);
  }
  .backlog-empty .icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--virto-bg-2);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--virto-blue);
    margin-bottom: 14px;
  }
  .backlog-empty h3 {
    color: var(--virto-navy);
    font-size: 17px;
    margin-bottom: 6px;
  }
  .backlog-empty p { font-size: 13px; line-height: 1.5; }
  .backlog-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--virto-line);
    transition: background 0.15s;
  }
  .backlog-item:last-child { border-bottom: none; }
  .backlog-item:hover { background: var(--virto-bg); }
  .backlog-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--virto-muted);
    width: 28px;
    flex-shrink: 0;
    text-align: right;
  }
  .backlog-item-title {
    flex: 1;
    font-size: 14px;
    color: var(--virto-navy);
    font-weight: 500;
    line-height: 1.4;
    min-width: 0;
  }
  .backlog-item-cat {
    font-size: 10px;
    color: var(--virto-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
    font-weight: 600;
  }
  .backlog-item-size {
    flex-shrink: 0;
  }
  .backlog-item-size .ts-pill {
    width: 28px; height: 22px;
    border-radius: 6px;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .backlog-item-remove {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--virto-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .backlog-item-remove:hover {
    background: rgba(255, 106, 61, 0.1);
    color: var(--virto-accent);
  }

  /* Toast notification for copy success */
  .toast {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--virto-navy);
    color: white;
    padding: 12px 22px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 12px 30px -10px rgba(7, 37, 74, 0.5);
    z-index: 300;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: center; gap: 10px;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .check-icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--size-s);
    display: inline-flex; align-items: center; justify-content: center;
  }

  .slide-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 22px 0;
    overflow: hidden;
  }
  .content-col {
    display: flex; flex-direction: column;
    gap: 14px;
    overflow: hidden; min-width: 0;
  }

  .topic-tag {
    display: inline-flex; align-items: center; gap: 8px;
    width: max-content;
    background: linear-gradient(90deg, rgba(43, 127, 255, 0.1), rgba(43, 127, 255, 0));
    color: var(--virto-blue);
    padding: 6px 14px 6px 10px;
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.2px;
  }
  .topic-tag::before {
    content: ""; width: 6px; height: 6px;
    background: var(--virto-blue); border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(43, 127, 255, 0.18);
  }
  .topic-tag.wow {
    background: linear-gradient(90deg, rgba(251, 191, 36, 0.18), rgba(251, 191, 36, 0));
    color: #B45309;
  }
  .topic-tag.wow::before {
    background: var(--virto-gold);
    box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.25);
  }

  .slide-title {
    font-size: clamp(20px, 2.4vw, 28px);
    line-height: 1.15; font-weight: 800;
    color: var(--virto-navy); letter-spacing: -0.7px;
  }
  .slide-title .accent {
    background: linear-gradient(90deg, var(--virto-blue), var(--virto-cyan));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .ps-block {
    border-left: 3px solid var(--virto-line);
    padding: 2px 0 2px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .ps-block.problem { border-left-color: var(--virto-accent); }
  .ps-block.solution { border-left-color: var(--virto-blue); }
  .ps-block.integration { border-left-color: var(--virto-navy); }

  .ps-label {
    font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--virto-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .ps-block.problem .ps-label { color: var(--virto-accent); }
  .ps-block.solution .ps-label { color: var(--virto-blue); }
  .ps-block.integration .ps-label { color: var(--virto-navy); }

  .ps-text {
    font-size: 13px; line-height: 1.5;
    color: var(--virto-text);
  }
  .ps-text strong { color: var(--virto-navy); font-weight: 600; }
  .ps-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: var(--virto-bg-2);
    color: var(--virto-navy);
    padding: 2px 6px; border-radius: 6px;
  }
  .ps-text ul { margin-top: 4px; padding-left: 18px; }
  .ps-text li { margin-bottom: 2px; }

  .visual-col {
    background: linear-gradient(135deg, var(--virto-bg) 0%, var(--virto-bg-2) 100%);
    border-radius: var(--radius);
    border: 1px solid var(--virto-line);
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }
  .visual-col img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; display: block;
  }
  .visual-caption {
    position: absolute;
    bottom: 12px; left: 12px; right: 12px;
    background: rgba(7, 37, 74, 0.85);
    color: white;
    backdrop-filter: blur(8px);
    padding: 8px 14px; border-radius: 10px;
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.2px; font-weight: 500;
  }

  .no-visual {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 40px; gap: 18px;
    color: var(--virto-navy);
  }
  .no-visual .icon-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--virto-blue), var(--virto-navy));
    display: flex; align-items: center; justify-content: center;
    color: white;
    box-shadow: 0 12px 30px -8px rgba(43, 127, 255, 0.5);
  }
  .no-visual h3 {
    font-size: 17px; font-weight: 700;
    color: var(--virto-navy); letter-spacing: -0.3px;
  }
  .no-visual p {
    font-size: 13px; color: var(--virto-muted);
    line-height: 1.5; max-width: 280px;
  }

  .slide-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 12px; border-top: 1px solid var(--virto-line);
    font-size: 12px; color: var(--virto-muted);
  }
  .slide-counter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500; color: var(--virto-navy);
  }
  .slide-counter .total { color: var(--virto-muted); }
  .slide-category {
    text-transform: uppercase; letter-spacing: 1.4px;
    font-weight: 600; font-size: 11px;
  }

  /* COVER */
  .cover {
    background:
      radial-gradient(ellipse at top right, rgba(43, 127, 255, 0.15), transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(56, 189, 248, 0.12), transparent 55%),
      linear-gradient(135deg, #07254A 0%, #0B3270 50%, #07254A 100%);
    color: white;
  }
  .cover .slide-header { border-color: rgba(255,255,255,0.15); }
  .cover .brand-text .b1 { color: white; }
  .cover .brand-text .b2 { color: rgba(255,255,255,0.6); }
  .cover .brand-mark { background: white; padding: 2px; }
  .cover .header-meta { color: rgba(255,255,255,0.7); }
  .cover .header-meta .pill {
    background: rgba(255,255,255,0.12); color: white;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .cover-body {
    display: flex; flex-direction: column;
    justify-content: center; gap: 22px;
    padding: 22px 0;
  }
  .cover-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    width: max-content;
    color: var(--virto-cyan);
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2.5px;
  }
  .cover-eyebrow::before { content: ""; width: 28px; height: 1.5px; background: var(--virto-cyan); }
  .cover-title {
    font-size: clamp(36px, 5.5vw, 60px);
    font-weight: 800; line-height: 1; letter-spacing: -2.5px;
  }
  .cover-title .grad {
    background: linear-gradient(90deg, #38BDF8, #FFFFFF);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .cover-sub {
    font-size: 15px; line-height: 1.55;
    color: rgba(255,255,255,0.8);
    max-width: 720px; font-weight: 300;
  }
  .cover-highlights {
    display: flex; gap: 12px;
    margin-top: 4px; flex-wrap: wrap;
  }
  .cover-chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 9px 16px; border-radius: 12px;
    font-size: 13px; color: white;
    backdrop-filter: blur(10px);
    display: flex; align-items: center; gap: 10px;
  }
  .cover-chip .num {
    color: var(--virto-cyan); font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .ts-legend {
    margin-top: 12px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    backdrop-filter: blur(10px);
  }
  .ts-legend-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: rgba(255,255,255,0.6); margin-bottom: 10px; font-weight: 600;
  }
  .ts-legend-items { display: flex; gap: 16px; flex-wrap: wrap; }
  .ts-legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: rgba(255,255,255,0.85);
  }
  .ts-legend-item .ts-pill {
    width: 28px; height: 22px;
    border-radius: 6px;

const backlog = new Set(); // stores slide indices
const backlogLink = document.getElementById('backlogLink');
const backlogCount = document.getElementById('backlogCount');
const toast = document.getElementById('toast');
const toastText = document.getElementById('toastText');

function showToast(msg) {
  toastText.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

function findBacklogSlideIndex() {
  return slides.findIndex(s => s.type === 'backlog');
}

function updateBacklogChrome() {
  const n = backlog.size;
  backlogCount.textContent = n;
  backlogLink.disabled = n === 0;
  // Sync all "+ Add" buttons to reflect current state
  document.querySelectorAll('[data-backlog-toggle]').forEach(btn => {
    const i = parseInt(btn.dataset.backlogToggle, 10);
    btn.classList.toggle('added', backlog.has(i));
  });
  // Re-render backlog list if visible
  renderBacklogList();
}

function renderBacklogList() {
  const list = document.getElementById('backlogList');
  if (!list) return;

  if (backlog.size === 0) {
    list.innerHTML = `
      <div class="backlog-empty">
        <div class="icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <h3>Your backlog is empty</h3>
        <p>Browse the deck and click <strong>+ Add to backlog</strong> on any feature you want to bring to your team.</p>
      </div>`;
    return;
  }

  const items = [...backlog].sort((a, b) => a - b);
  list.innerHTML = items.map((i, n) => {
    const s = slides[i];
    const sizeColor = `var(--size-${(s.size || 'm').toLowerCase()})`;
    return `
      <div class="backlog-item">
        <span class="backlog-item-num">${String(n+1).padStart(2,'0')}</span>
        <div class="backlog-item-title">
          ${stripHTML(s.title)}
          <div class="backlog-item-cat">${s.category}</div>
        </div>
        <div class="backlog-item-size">
          <span class="ts-pill" style="background: ${sizeColor};">${s.size || '—'}</span>
        </div>
        <button class="backlog-item-remove" data-remove="${i}" title="Remove">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
  }).join('');

  // Wire up remove buttons
  list.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.remove, 10);
      backlog.delete(i);
      updateBacklogChrome();
    });
  });
}

function buildMarkdown() {
  const items = [...backlog].sort((a, b) => a - b);
  const lines = [
    '# Virto Commerce — February 2026 Backlog',
    '',
    `Selected ${items.length} feature${items.length === 1 ? '' : 's'} from the release notes.`,
    '',
    '| # | Feature | Size | Category |',
    '| --- | --- | --- | --- |'
  ];
  items.forEach((i, n) => {
    const s = slides[i];
    const title = stripHTML(s.title).replace(/\|/g, '\\|');
    const cat = s.category.replace(/\|/g, '\\|');
    lines.push(`| ${n+1} | ${title} | ${s.size || '—'} | ${cat} |`);
  });
  lines.push('');
  lines.push('---');
  lines.push('Source: https://www.virtocommerce.org/t/virto-s-release-notes-february-2026/834');
  return lines.join('\n');
}

async function copyBacklog() {
  if (backlog.size === 0) return;
  const md = buildMarkdown();
  const btn = document.getElementById('copyBacklogBtn');
  const label = document.getElementById('copyBtnLabel');
  try {
    await navigator.clipboard.writeText(md);
    btn.classList.add('copied');
    label.textContent = 'Copied!';
    showToast(`${backlog.size} feature${backlog.size === 1 ? '' : 's'} copied as Markdown`);
    setTimeout(() => {
      btn.classList.remove('copied');
      label.textContent = 'Copy as Markdown';
    }, 2000);
  } catch (e) {
    // Fallback: select-and-show
    const ta = document.createElement('textarea');
    ta.value = md;
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showToast(`${backlog.size} features copied`);
    } catch (err) {
      showToast('Copy failed — please select manually');
    }
    document.body.removeChild(ta);
  }
}

function attachBacklogHandlers() {
  // Per-slide "+ Add" buttons
  document.querySelectorAll('[data-backlog-toggle]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const i = parseInt(btn.dataset.backlogToggle, 10);
      if (backlog.has(i)) {
        backlog.delete(i);
        showToast('Removed from backlog');
      } else {
        backlog.add(i);
        showToast('Added to backlog');
      }
      updateBacklogChrome();
    });
  });

  // Backlog screen action buttons
  const copyBtn = document.getElementById('copyBacklogBtn');
  if (copyBtn) copyBtn.addEventListener('click', copyBacklog);

  const clearBtn = document.getElementById('clearBacklogBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      if (backlog.size === 0) return;
      if (confirm(`Clear all ${backlog.size} backlog items?`)) {
        backlog.clear();
        updateBacklogChrome();
        showToast('Backlog cleared');
      }
    });
  }

  updateBacklogChrome();
}

// Backlog link in main nav
backlogLink.addEventListener('click', () => {
  if (backlog.size === 0) return;
  showSlide(findBacklogSlideIndex());
});

function render() {
  let html = '';
  slides.forEach((s, i) => {
    if (s.type === 'cover') html += renderCover();
    else if (s.type === 'divider') html += renderDivider(s, i);
    else if (s.type === 'backlog') html += renderBacklog(i);
    else if (s.type === 'thanks') html += renderThanks(i);
    else html += renderContent(s, i);
  });
  stage.innerHTML = html;
  document.getElementById('totalSlides').textContent = String(totalSlides).padStart(2,'0');
  attachImageFallbacks();
  attachBacklogHandlers();
  showSlide(0);
}

function showSlide(i) {
  if (i < 0 || i >= totalSlides) return;
  currentIndex = i;
  document.querySelectorAll('.slide').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  document.getElementById('currentSlide').textContent = String(i+1).padStart(2,'0');
  document.getElementById('progressBar').style.width = `${((i+1)/totalSlides)*100}%`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === totalSlides - 1;
  // Re-render backlog list whenever we land on the backlog slide
  if (slides[i] && slides[i].type === 'backlog') {
    renderBacklogList();
  }
}

document.getElementById('prevBtn').addEventListener('click', () => showSlide(currentIndex - 1));
document.getElementById('nextBtn').addEventListener('click', () => showSlide(currentIndex + 1));
document.querySelectorAll('.jump-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.jump;
    showSlide(target === 'end' ? totalSlides - 1 : 0);
  });
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function toggleCurrentInBacklog() {
  const s = slides[currentIndex];
  if (!s || !s.size || s.type) {
    showToast('Nothing to add on this slide');
    return;
  }
  if (backlog.has(currentIndex)) {
    backlog.delete(currentIndex);
    showToast('Removed from backlog');
  } else {
    backlog.add(currentIndex);
    showToast('Added to backlog');
  }
  updateBacklogChrome();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
    e.preventDefault();
    showSlide(currentIndex + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
    e.preventDefault();
    showSlide(currentIndex - 1);
  } else if (e.key === 'Home') {
    e.preventDefault();
    showSlide(0);
  } else if (e.key === 'End') {
    e.preventDefault();
    showSlide(totalSlides - 1);
  } else if (e.key === 'f' || e.key === 'F') {
    toggleFullscreen();
  } else if (e.key === 'b' || e.key === 'B') {
    toggleCurrentInBacklog();
  }
});

// Clickable hint keys
document.getElementById('hintPrev').addEventListener('click', () => showSlide(currentIndex - 1));
document.getElementById('hintNext').addEventListener('click', () => showSlide(currentIndex + 1));
document.getElementById('hintBacklog').addEventListener('click', toggleCurrentInBacklog);
document.getElementById('hintFullscreen').addEventListener('click', toggleFullscreen);


let touchStartX = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
});
document.addEventListener('touchend', (e) => {
  const touchEndX = e.changedTouches[0].screenX;
  const delta = touchEndX - touchStartX;
  if (Math.abs(delta) > 60) {
    if (delta < 0) showSlide(currentIndex + 1);
    else showSlide(currentIndex - 1);
  }
});

render();
</script>
</body>
</html>
